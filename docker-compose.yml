version: '3'

services:
  frontend:
    image: moguda/timeapp_front_fsda_oct_24_2_ru
    restart: always
    ports:
      - '3000:3000'
    # volumes:
    #   - /app/node_modules
    #   - ./frontend:/app
    
  api:
    image: moguda/timeapp_api_fsda_oct_24_2_ru
    restart: always
    ports:
      - '5000:5000'
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PORT: '3306'
      MYSQL_PASSWORD: password
      MYSQL_DB: time_db
    # volumes:
    #   - /app/node_modules
    #   - ./api:/app

  mysql:
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: time_db
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    restart: always
    ports:
      - '8080:8080'

volumes:
  mysql_data:
