name: CI/CD for time-app project

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.19.3']
    
    steps:
      - name: Cloning repository
        uses: actions/checkout@v6
      
      - name: Install Node.js ${{matrix.node-version}}
        uses: actions/setup-node@v6
        with:
          node-version: ${{matrix.node-version}}
      
      - name: API Dependency install
        working-directory: ./api
        run: npm install

      - name: Run unit test
        working-directory: ./api
        run: npm test

      - name: Frontend Dependency install
        working-directory: ./frontend
        run: npm install
  
  docker-image-build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Cloning repository
        uses: actions/checkout@v6

      - name: Docker Login
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin
      
      - name: API image build and push to docker hub
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/timeapp_api_fsda_oct_24_2_ru ./api
          docker push ${{secrets.DOCKER_USERNAME}}/timeapp_api_fsda_oct_24_2_ru
        
      - name: Frontend image build and push to docker hub
        run: |
            docker build -t ${{secrets.DOCKER_USERNAME}}/timeapp_front_fsda_oct_24_2_ru ./frontend
            docker push ${{secrets.DOCKER_USERNAME}}/timeapp_front_fsda_oct_24_2_ru
    
  deploy-to-aws-vm:
    needs: docker-image-build-and-deploy
    runs-on: ubuntu-latest

    steps:
      - name: AWS ec-2 deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.AWS_VM_HOST}}
          username: ${{secrets.AWS_VM_USERNAME}}
          key: ${{secrets.AWS_VM_SSH_KEY}}
          port: 22

          script: |
            if [ ! "/app/ci_cd_FSDA_Oct_24_2_ru/.git" ]; then
            git clone https://github.com/Zamanof/ci_cd_FSDA_Oct_24_2_ru.git
            fi

            cd /app/ci_cd_FSDA_Oct_24_2_ru
            git pull origin main
            docker compose pull
            docker compose down
            docker compose up -d
            docker image prune -f


      